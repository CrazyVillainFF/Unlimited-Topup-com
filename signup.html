<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Sign Up | Unlimited Topup</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css?v=20260619-coin-icon-size"></head><body><main class="auth-page"><section class="auth-panel"><a class="brand" href="index.html"><span class="brand-mark">UT</span><span class="brand-text"><strong>Unlimited Topup</strong><span>Firebase signup</span></span></a><h1>Create Account</h1><p class="subtitle">Create an account with Google or Firebase email and password.</p><button class="btn google full" type="button" id="googleBtn">Continue with Google</button><div class="auth-divider">or</div><form class="auth-form" id="signupForm"><label>Username<input id="username" placeholder="Choose username" minlength="3" maxlength="20" required></label><label>Gmail ID<input id="gmail" type="email" placeholder="name@gmail.com" required></label><label>Password<input id="password" type="password" placeholder="Create password" required></label><div class="password-meter"><span id="meter"></span></div><label>Confirm Password<input id="confirm" type="password" placeholder="Repeat password" required></label><div class="error-msg" id="error"></div><div class="success-msg" id="success"></div><button class="btn primary full" type="submit" id="signupBtn">Create Account</button></form><div class="auth-footer">Already registered? <a href="login.html">Login here</a> | <a href="index.html">Home</a></div><p class="notice" id="loggedInNotice" style="display:none;margin-top:16px;"></p></section></main><script type="module">import { authReady, auth, createAccount, loginWithGoogle, logoutAccount, gmailValid, strongPassword, showLoading, hideLoading } from './site.js?v=20260619-resident-evil'; await authReady; const notice=document.getElementById('loggedInNotice'); if(auth.currentUser){notice.style.display='block'; notice.innerHTML='Already signed in as <strong>'+auth.currentUser.email+'</strong>. You can still view this page, or <button class="btn ghost" id="signOutBtn" type="button">Sign Out</button> to create another account.';} document.getElementById('signOutBtn')?.addEventListener('click', async()=>{await logoutAccount(); location.reload();}); const password=document.getElementById('password'), meter=document.getElementById('meter'), btn=document.getElementById('signupBtn'), error=document.getElementById('error'), success=document.getElementById('success'), googleBtn=document.getElementById('googleBtn'); googleBtn.addEventListener('click', async()=>{error.textContent=''; googleBtn.disabled=true; googleBtn.textContent='Opening Google...'; showLoading('Opening Google sign-in...'); const result=await loginWithGoogle(); if(!result.ok){hideLoading(); error.textContent=result.message; googleBtn.disabled=false; googleBtn.textContent='Continue with Google'; return;} showLoading('Opening your profile...'); window.location.href='index.html';}); password.addEventListener('input',()=>{const v=password.value;let s=0;if(v.length>=8)s++;if(/[a-z]/.test(v))s++;if(/[A-Z]/.test(v))s++;if(/\d/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;meter.style.width=Math.min(s*20,100)+'%';meter.style.background=s<3?'#ff6b6b':s<5?'#f7c948':'#31d09f';}); document.getElementById('signupForm').addEventListener('submit', async (e)=>{e.preventDefault(); error.textContent=''; success.textContent=''; const username=document.getElementById('username').value.trim(); const email=document.getElementById('gmail').value.trim(); const pass=password.value; const confirm=document.getElementById('confirm').value; if(!gmailValid(email)){error.textContent='Please enter a valid Gmail address.'; return;} if(!strongPassword(pass)){error.textContent='Password must be at least 8 characters and include a number plus uppercase or symbol.'; return;} if(pass!==confirm){error.textContent='Passwords do not match.'; return;} btn.disabled=true; btn.textContent='Creating account...'; showLoading('Creating account...'); const result=await createAccount(username,email,pass); if(!result.ok){hideLoading(); error.textContent=result.message; btn.disabled=false; btn.textContent='Create Account'; return;} if(result.warning){success.textContent='Account created, but setup needs checking: '+result.warning;} else {success.textContent='Account created successfully. Redirecting...';} showLoading('Opening your profile...'); setTimeout(()=>{window.location.href='index.html';},900);});</script></body></html>
