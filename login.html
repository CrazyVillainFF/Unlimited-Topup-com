<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Unlimited Topup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260619-coin-icon-size">
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel">
      <a class="brand" href="index.html">
        <span class="brand-mark">UT</span>
        <span class="brand-text">
          <strong>Unlimited Topup</strong>
          <span>Secure account access</span>
        </span>
      </a>
      <h1>Login</h1>
      <p class="subtitle">Sign in securely with Google or your email account. Unlimited Topup cannot see your Google password and will never ask for your email password, OTP, or banking PIN.</p>

      <button class="btn google full" type="button" id="googleBtn">Continue with Google</button>
      <div class="auth-divider">or</div>

      <form class="auth-form" id="loginForm">
        <label>Gmail ID
          <input id="gmail" type="email" autocomplete="email" placeholder="name@gmail.com" required>
        </label>
        <label>Password
          <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
        </label>
        <div class="error-msg" id="error"></div>
        <button class="btn primary full" type="submit" id="loginBtn">Login</button>
      </form>

      <div class="auth-footer">
        <a href="forgot-password.html">Forgot password?</a> |
        <a href="signup.html">Create account</a> |
        <a href="index.html">Home</a>
      </div>
      <p class="notice" id="loggedInNotice" style="display:none;margin-top:16px;"></p>
    </section>
  </main>

  <script type="module">
    import {
      authReady,
      auth,
      loginAccount,
      loginWithGoogle,
      logoutAccount,
      gmailValid,
      showLoading,
      hideLoading
    } from './site.js?v=20260619-resident-evil';

    const notice = document.getElementById('loggedInNotice');
    const form = document.getElementById('loginForm');
    const error = document.getElementById('error');
    const btn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleBtn');

    await authReady;

    if (auth.currentUser) {
      showLoading('Opening your profile...');
      window.location.replace('index.html');
      notice.style.display = 'block';
      notice.innerHTML = 'Already signed in as <strong>' + auth.currentUser.email + '</strong>. <button class="btn ghost" id="signOutBtn" type="button">Sign Out</button>';
    }

    document.getElementById('signOutBtn')?.addEventListener('click', async () => {
      await logoutAccount();
      location.reload();
    });

    googleBtn.addEventListener('click', async () => {
      error.textContent = '';
      googleBtn.disabled = true;
      googleBtn.textContent = 'Opening Google...';
      showLoading('Opening Google sign-in...');

      const result = await loginWithGoogle();
      if (!result.ok) {
        hideLoading();
        error.textContent = result.message;
        googleBtn.disabled = false;
        googleBtn.textContent = 'Continue with Google';
        return;
      }

      showLoading('Opening your profile...');
      window.location.replace('index.html');
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      error.textContent = '';
      const email = document.getElementById('gmail').value.trim();
      const password = document.getElementById('password').value;

      if (!gmailValid(email)) {
        error.textContent = 'Please enter a valid Gmail address.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      showLoading('Logging in...');

      const result = await loginAccount(email, password);
      if (!result.ok) {
        hideLoading();
        error.textContent = result.message;
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }

      showLoading('Opening your profile...');
      window.location.replace('index.html');
    });
  </script>
</body>
</html>
